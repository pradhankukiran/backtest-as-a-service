x-app-environment: &app-environment
  DEBUG: ${DEBUG:-true}
  SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000}
  DATABASE_URL: ${DATABASE_URL:-postgres://backtester:backtester@db:5432/backtester}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}

services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: backtester
      POSTGRES_USER: backtester
      POSTGRES_PASSWORD: backtester
    ports:
      - "5432:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backtester -d backtester"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    environment:
      <<: *app-environment
      BACKTESTER_ROLE: web
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    environment:
      <<: *app-environment
      BACKTESTER_ROLE: worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-untrusted:
    # Runs user-supplied strategy code only. The hardening below is intentional
    # and meaningful — keep it on by default. For production-grade isolation
    # also attach this service to an `internal: true` network with no external
    # egress; see README "Sandboxing notes" for the recipe.
    build: .
    environment:
      <<: *app-environment
      BACKTESTER_ROLE: worker-untrusted
    cap_drop: ["ALL"]
    security_opt:
      - "no-new-privileges:true"
    pids_limit: 256
    mem_limit: 1g
    cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    environment:
      <<: *app-environment
      BACKTESTER_ROLE: beat
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  timescale-data:
