<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Backtester{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald: #059669;
            --emerald-dark: #047857;
            --emerald-darker: #065f46;
            --emerald-50: #ecfdf5;
            --emerald-100: #d1fae5;
            --ink: #0a1f17;
            --muted: #4a5b54;
            --line: #d8e3df;
            --bg: #f8fbfa;
            --green: #15803d;
            --green-bg: #f0fdf4;
            --red: #dc2626;
            --red-bg: #fef2f2;
            --amber: #d97706;
            --amber-bg: #fffbeb;
            --slate: #64748b;
            --slate-bg: #f1f5f9;
        }
        * { box-sizing: border-box; border-radius: 0 !important; margin: 0; padding: 0; }
        html, body { min-height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--ink);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
        }
        .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
        a { color: var(--emerald); text-decoration: none; }
        a:hover { color: var(--emerald-dark); }

        nav.topbar {
            border-bottom: 1px solid var(--line);
            background: white;
        }
        nav.topbar .inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        nav.topbar .brand {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--emerald);
        }
        nav.topbar .links {
            display: flex;
            gap: 24px;
            font-size: 14px;
            font-weight: 500;
        }
        nav.topbar .links a { color: var(--muted); }
        nav.topbar .links a:hover, nav.topbar .links a.active { color: var(--emerald); }

        .wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 32px;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--emerald);
            margin-bottom: 8px;
        }
        h2 {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin: 32px 0 12px;
        }
        .lead { font-size: 16px; color: var(--muted); margin-bottom: 32px; max-width: 640px; }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 4px 10px;
            border: 1px solid var(--line);
            background: white;
        }
        .pill .dot { width: 6px; height: 6px; display: inline-block; }
        .pill.ok      { color: var(--green); border-color: #bbf7d0; background: var(--green-bg); }
        .pill.ok      .dot { background: var(--green); }
        .pill.bad     { color: var(--red);   border-color: #fecaca; background: var(--red-bg); }
        .pill.bad     .dot { background: var(--red); }
        .pill.warn    { color: var(--amber); border-color: #fde68a; background: var(--amber-bg); }
        .pill.warn    .dot { background: var(--amber); }
        .pill.idle    { color: var(--slate); border-color: var(--line); background: var(--slate-bg); }
        .pill.idle    .dot { background: var(--slate); }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border: 1px solid var(--line);
            font-size: 13px;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--line);
        }
        th {
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            background: var(--slate-bg);
        }
        tr:last-child td { border-bottom: none; }
        tbody tr[onclick] { transition: background 0.1s ease; }
        tbody tr[onclick]:hover { background: var(--emerald-50); }
        tbody tr[onclick]:hover td a { color: var(--emerald-dark); }
        td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
        td.pos { color: var(--green); }
        td.neg { color: var(--red); }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1px;
            background: var(--line);
            border: 1px solid var(--line);
        }
        .metric {
            background: white;
            padding: 16px 20px;
        }
        .metric .label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .metric .value {
            font-size: 22px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--ink);
        }
        .metric .value.pos { color: var(--green); }
        .metric .value.neg { color: var(--red); }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.02em;
            border: 1px solid var(--emerald);
            background: var(--emerald);
            color: white;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.1s ease, border-color 0.1s ease;
        }
        .btn:hover { background: var(--emerald-dark); border-color: var(--emerald-dark); color: white; }
        .btn.ghost { background: white; color: var(--emerald); }
        .btn.ghost:hover { background: var(--emerald-50); color: var(--emerald-dark); }

        .toast {
            padding: 12px 16px;
            margin-bottom: 24px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid;
        }
        .toast.success { color: var(--green); border-color: #bbf7d0; background: var(--green-bg); }
        .toast.error   { color: var(--red);   border-color: #fecaca; background: var(--red-bg); }
        .toast.info    { color: var(--emerald-dark); border-color: var(--emerald-100); background: var(--emerald-50); }
    </style>
</head>
<body>
    <nav class="topbar">
        <div class="inner">
            <a href="{% url 'landing' %}" class="brand">Backtester</a>
            <div class="links">
                <a href="{% url 'runs-page' %}">Runs</a>
                <a href="{% url 'sweeps-page' %}">Sweeps</a>
                <a href="/admin/">Admin</a>
                <a href="/api/docs/">API</a>
            </div>
        </div>
    </nav>
    <div class="wrap">
        {% if messages %}
            {% for message in messages %}
                <div class="toast {% if message.tags == 'success' %}success{% elif message.tags == 'error' %}error{% else %}info{% endif %}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
